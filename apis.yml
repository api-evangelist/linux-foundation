aid: linux-foundation
name: Linux Foundation
description: >-
  The Linux Foundation is a nonprofit technology consortium that supports open
  source projects and ecosystems. It provides a neutral home for collaboration
  on open source software, hardware, standards, and data, and hosts hundreds of
  projects including the Linux kernel, Kubernetes, Node.js, PyTorch, OpenSSF,
  CNCF, RISC-V, and FINOS. The LFX platform offers tooling and insights for
  open source contributors and member organizations.
